<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Offline Transcription - Transformers.js Demo</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #4ecca3;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        
        .status-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .status-row:last-child {
            border-bottom: none;
        }
        
        .status-label {
            color: #888;
        }
        
        .status-value {
            font-weight: 600;
        }
        
        .status-value.loading {
            color: #f9a825;
        }
        
        .status-value.ready {
            color: #4ecca3;
        }
        
        .status-value.error {
            color: #ef5350;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecca3, #45b7aa);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .record-section {
            text-align: center;
            margin: 30px 0;
        }
        
        #recordBtn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #4ecca3;
            background: transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        
        #recordBtn:hover:not(:disabled) {
            background: rgba(78, 204, 163, 0.1);
            transform: scale(1.05);
        }
        
        #recordBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #666;
        }
        
        #recordBtn .mic-icon {
            width: 40px;
            height: 40px;
            fill: #4ecca3;
        }
        
        #recordBtn.recording {
            border-color: #ef5350;
            animation: pulse 1.5s infinite;
        }
        
        #recordBtn.recording .mic-icon {
            fill: #ef5350;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 83, 80, 0.4); }
            50% { box-shadow: 0 0 0 20px rgba(239, 83, 80, 0); }
        }
        
        .record-hint {
            margin-top: 15px;
            color: #888;
            font-size: 0.9rem;
        }
        
        .waveform {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            margin: 20px 0;
        }
        
        .waveform .bar {
            width: 4px;
            background: #4ecca3;
            border-radius: 2px;
            transition: height 0.1s ease;
        }
        
        .result-section {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .result-label {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }
        
        .arabic-text {
            font-family: 'Amiri', 'Traditional Arabic', 'Scheherazade', serif;
            font-size: 2rem;
            line-height: 2;
            text-align: center;
            color: #fff;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .arabic-text.placeholder {
            color: #555;
            font-size: 1rem;
            font-family: inherit;
        }
        
        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .metric {
            text-align: center;
        }
        
        .metric-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: #4ecca3;
        }
        
        .metric-label {
            font-size: 0.75rem;
            color: #888;
            margin-top: 4px;
        }
        
        .logs {
            background: #0d1117;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.75rem;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .log-entry:last-child {
            border-bottom: none;
        }
        
        .log-time {
            color: #666;
            margin-left: 8px;
        }
        
        .log-info { color: #58a6ff; }
        .log-success { color: #4ecca3; }
        .log-warn { color: #f9a825; }
        .log-error { color: #ef5350; }
        
        /* Load Amiri font for Arabic */
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');
    </style>
</head>
<body>
    <div class="container">
        <h1>🕌 Quran Offline Transcription</h1>
        <p class="subtitle">Powered by Transformers.js + Tarteel Whisper</p>
        
        <div class="status-panel">
            <div class="status-row">
                <span class="status-label">Model</span>
                <span id="modelName" class="status-value" style="font-size: 0.85rem">tarteel-ai/whisper-tiny-ar-quran (ONNX)</span>
            </div>
            <div class="status-row">
                <span class="status-label">Status</span>
                <span id="modelStatus" class="status-value loading">Loading...</span>
            </div>
            <div class="status-row">
                <span class="status-label">Load Time</span>
                <span id="loadTime" class="status-value">—</span>
            </div>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
        </div>
        
        <div class="record-section">
            <button id="recordBtn" disabled>
                <svg class="mic-icon" viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </button>
            <p id="recordHint" class="record-hint">Loading model...</p>
        </div>
        
        <div class="waveform" id="waveform" style="display: none;">
            <!-- Bars generated by JS -->
        </div>
        
        <div class="result-section">
            <div class="result-label">Transcription</div>
            <div id="transcription" class="arabic-text placeholder">
                Transcribed text will appear here
            </div>
            
            <div class="metrics">
                <div class="metric">
                    <div id="inferenceTime" class="metric-value">—</div>
                    <div class="metric-label">Inference Time</div>
                </div>
                <div class="metric">
                    <div id="audioDuration" class="metric-value">—</div>
                    <div class="metric-label">Audio Duration</div>
                </div>
            </div>
        </div>
        
        <div class="logs" id="logs">
            <div class="log-entry log-info">
                <span class="log-time">[00:00:00]</span>
                Initializing...
            </div>
        </div>
    </div>
    
    <script type="module" src="app.js"></script>
</body>
</html>
