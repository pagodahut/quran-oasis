name: Bug Report
description: Report a bug with enough context for an agent or developer to fix it.
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's broken? Be specific.
      placeholder: "The Tajweed Practice panel opens but shows blank content..."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: Exact steps to trigger the bug.
      placeholder: |
        1. Open /quran/7
        2. Tap ayah 2
        3. Tap "Tajweed Practice"
        4. Bottom sheet opens with blank content
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error Output
      description: Console errors, stack traces, or network failures. Paste the FULL error.
      placeholder: |
        TypeError: Cannot read properties of undefined (reading 'rules')
          at TajweedPanel (src/components/TajweedPanel.tsx:47)
          at renderWithHooks (react-dom.development.js:...)
      render: shell
    validations:
      required: true

  - type: textarea
    id: affected-files
    attributes:
      label: Affected Files / Components
      description: Which files, components, or routes are involved? Grep the codebase if unsure.
      placeholder: |
        - src/components/TajweedPanel.tsx
        - src/app/quran/[surah]/page.tsx
        - src/lib/tajweed.ts
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical (feature completely broken)
        - High (major functionality impaired)
        - Medium (annoying but workaround exists)
        - Low (cosmetic / minor)
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, related issues, environment details, partial fixes attempted.
